                    <div class="col-md-3 col-sm-3 col-7 card-kpi p-3 mt-4">

                <div class="row gy-4 justify-content-around mt-5 maquina">

                        <h1><img src="../assets/imgs/hospital.png" alt=""></h1>

                            <div class="ram"><p><img src="../assets/imgs/ram.png" alt=""></p> <div class="porcentagemRam"></div></div>

                        </div>
                    </div>
                    <div class="col-md-3 col-9 card-maquina maquina2"  style="border: 3px solid #746cc2;">
                        <h1><img src="../assets/imgs/farmacia.png" alt=""></h1>
                        <div class="componentes">
                            <div class="ram"><p><img src="../assets/imgs/ram.png" alt=""></p> <div class="porcentagemRam"></div></div>
                            <div class="cpu"><p><img src="../assets/imgs/cpuDash.png" alt=""></p><div class="porcentagemCpu"></div></div>
                            <div class="disco"><p><img src="../assets/imgs/cartao-de-memoria.png" alt=""></p> <div class="porcentagemDisco"></div></div>
                        </div>
                    </div>
                    <div class="col-md-3 col-9 card-maquina maquina3"  style="border: 3px solid #746cc2;">
                        <h1><img src="../assets/imgs/estrela-da-vida.png" alt=""></h1>
                        <div class="componentes">
                            <div class="ram"><p><img src="../assets/imgs/ram.png" alt=""></p> <div class="porcentagemRam"></div></div>
                            <div class="cpu"><p><img src="../assets/imgs/cpuDash.png" alt=""></p><div class="porcentagemCpu"></div></div>

                </div>
                <div class="row justify-content-center mt-5 buttonadd">
                    <button type="button" class="btn btn-primary buttonadd" data-bs-toggle="modal"
                        data-bs-target="#addMachineForm"
                        style="background-color: #280B4A; color: #FFF; width: 200px; height: 20%; display: flex; justify-content: center; margin-right: 15px;"><img
                            src="../assets/imgs/adicionar.png" alt="Descrição" style="width:20px;height:20px;">Adicionar
                        Máquina</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addMachineForm" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="background-color: #CED8E4;">
                <div class="modal-header" style="background-color: gray;">
                    <h1 class="modal-title fs-5" id="exampleModalLabel" style="color: #FFF;">Adicionar Máquina</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="input_num_serie" class="col-form-label">Numeração:</label>
                            <input type="text" class="form-control" id="input_num_serie">
                        </div>
                        <div class="mb-3">
                            <label for="input_localizacao" class="col-form-label">Localização:</label>
                            <input class="form-control" id="input_localizacao">
                        </div>
                        <div class="mb-3">
                            <label for="input_modelo" class="col-form-label">Modelo:</label>
                            <input class="form-control" id="input_modelo">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button onclick="adicionarMaquina()" type="button" class="btn btn-primary"
                        style="background-color: #280B4A; color: #FFF; width: 45%; height: 20%; display: flex; justify-content: center; margin-right: 15px;"><img
                            src="../assets/imgs/adicionar.png" alt="Descrição" style="width:20px;height:20px;">
                        Cadastrar Máquina</button>
                </div>
            </div>
        </div>

</html>
<script src="../bootstrap-5.3.8-dist/js/bootstrap.js"></script>
<script src="../services/api.js"></script>
<script src="../services/maquinaService.js"></script>
<script>
    var nomeUsuario = sessionStorage.NOME_USUARIO
    spanNome.innerHTML = nomeUsuario

    async function adicionarMaquina() {
        var num_serie = input_num_serie.value
        var modelo = input_modelo.value
        var fkFabricante = sessionStorage.ID_EMPRESA

        let response = await adicionarMaquinaService(num_serie, modelo, fkFabricante)

        console.log(response);

        alert(response);        
    }
</script>
