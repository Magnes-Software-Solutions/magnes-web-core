<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAGNES — MRI Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/telaAlerta.css" />
</head>

<body>

    <!-- ── Navbar Bootstrap (topo) ─────────────────────────────────── -->
    <nav class="navbar fixed-top navBarTop">
        <div class="container-fluid">
            <div class="d-flex align-items-center gap-2">
                <img src="../assets/imgs/Logo.png" alt="Logo" class="navLogo"
                     onerror="this.style.display='none'" />
                <div>
                    <p class="tituloLogo mb-0">MAGNES</p>
                    <p class="textoLogo mb-0">MRI MONITOR</p>
                </div>
            </div>

            <button class="navbar-toggler navBarToggler" type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar"
                    aria-controls="offcanvasNavbar">
                <span class="navbar-toggler-icon navBarTogglerIcon"></span>
            </button>

            <div class="offcanvas offcanvas-end offCanvas"
                 tabindex="-1"
                 id="offcanvasNavbar"
                 aria-labelledby="offcanvasNavbarLabel">

                <div class="offcanvas-header">
                    <h5 class="offcanvas-title offCanvasTitle" id="offcanvasNavbarLabel">MAGNES</h5>
                    <button type="button" class="btn-close offCanvasButton"
                            data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
                </div>

                <div class="offcanvas-body offcanvasBody">
                    <ul class="navbar-nav flex-column gap-1 navBarNav">
                        <li class="nav-item navLi" onclick="window.location.href='dashAnalista.html'">
                            <img src="../assets/imgs/dashboard.svg" alt="" class="navItemIcon" />
                            <a class="nav-link">Dashboard</a>
                        </li>
                        <li class="nav-item navLi navLiActive">
                            <img src="../assets/imgs/alert.svg" alt="" class="navItemIcon" />
                            <a class="nav-link">Alerta</a>
                        </li>
                        <li class="nav-item navLi">
                            <img src="../assets/imgs/bar.svg" alt="" class="navItemIcon" />
                            <a class="nav-link" href="#">Relatório</a>
                        </li>
                        <li class="nav-item navLi">
                            <img src="../assets/imgs/person.svg" alt="" class="navItemIcon" />
                            <a class="nav-link" href="#">Cadastrar Analista</a>
                        </li>
                        <li class="nav-item navLi">
                            <img src="../assets/imgs/build.svg" alt="" class="navItemIcon" />
                            <a class="nav-link" href="#">Cadastrar Máquina</a>
                        </li>
                    </ul>
                </div>

                <div class="offcanvas-header perfil">
                    <img class="perfilImage" src="../assets/imgs/person-circle.svg" alt="Perfil" />
                    <div class="textosPerfil">
                        <h5 class="offcanvas-title mb-0" id="nomeUsuarioNav">—</h5>
                        <p class="mb-0 text-muted" style="font-size:12px;" id="cargoUsuarioNav">Analista de Sistemas</p>
                    </div>
                    <img class="perfilConfig" src="../assets/imgs/gear.svg" alt="Configurações" />
                </div>
            </div>
        </div>
    </nav>

    <!-- ── Conteúdo principal ───────────────────────────────────────── -->
    <main>
        <h1>Central de Alertas</h1>

        <!-- Cards de resumo -->
        <div class="summary">
            <div class="s-card s-total">
                <div>
                    <div class="s-label">TOTAL</div>
                    <div class="s-num" id="count-total">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#38bdf8" stroke-width="1.8">
                        <circle cx="11" cy="11" r="9" />
                        <line x1="11" y1="7" x2="11" y2="11.5" />
                        <circle cx="11" cy="14.5" r="1" fill="#38bdf8" stroke="none" />
                    </svg>
                </div>
            </div>

            <div class="s-card s-crit">
                <div>
                    <div class="s-label">CRÍTICOS</div>
                    <div class="s-num" id="count-crit">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f43f5e" stroke-width="1.8">
                        <circle cx="11" cy="11" r="9" />
                        <line x1="11" y1="7" x2="11" y2="11.5" />
                        <circle cx="11" cy="14.5" r="1" fill="#f43f5e" stroke="none" />
                    </svg>
                </div>
            </div>

            <div class="s-card s-warn">
                <div>
                    <div class="s-label">ATENÇÃO</div>
                    <div class="s-num" id="count-warn">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f59e0b" stroke-width="1.8">
                        <path d="M11 3L20 19H2L11 3z" />
                        <line x1="11" y1="10" x2="11" y2="14" />
                        <circle cx="11" cy="16.5" r="1" fill="#f59e0b" stroke="none" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Lista de alertas gerada pelo JS -->
        <div class="alerts-list" id="alerts-list">
            <div class="loading-msg">Carregando alertas...</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* ── Usuário ──────────────────────────────────────────────── */
        (function () {
            var nome = sessionStorage.getItem("NOME_USUARIO");
            if (nome) {
                var el = document.getElementById("nomeUsuarioNav");
                if (el) el.textContent = nome;
            } else {
                window.location = "../login.html";
            }
        })();

        /* ── SVG helpers ──────────────────────────────────────────── */
        function iconeTipo(tipo) {
            if (tipo === "critico") return `
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"
                     stroke="#f43f5e" stroke-width="1.8" stroke-linecap="round">
                    <circle cx="11" cy="11" r="9"/>
                    <line x1="11" y1="7" x2="11" y2="12"/>
                    <circle cx="11" cy="15" r="1.1" fill="#f43f5e" stroke="none"/>
                </svg>`;
            if (tipo === "aviso") return `
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"
                     stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round">
                    <path d="M11 3L20 19H2L11 3z"/>
                    <line x1="11" y1="9" x2="11" y2="14"/>
                    <circle cx="11" cy="16.5" r="1.1" fill="#f59e0b" stroke="none"/>
                </svg>`;
            return `
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none"
                     stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round">
                    <circle cx="11" cy="11" r="9"/>
                    <line x1="11" y1="10" x2="11" y2="15"/>
                    <circle cx="11" cy="7" r="1.1" fill="#38bdf8" stroke="none"/>
                </svg>`;
        }

        function svgServer() {
            return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"
                         stroke="currentColor" stroke-width="1.3">
                        <rect x="1" y="1" width="11" height="4.5" rx="1.2"/>
                        <rect x="1" y="7.5" width="11" height="4.5" rx="1.2"/>
                        <circle cx="9.5" cy="3.25" r=".7" fill="currentColor" stroke="none"/>
                        <circle cx="9.5" cy="9.75" r=".7" fill="currentColor" stroke="none"/>
                    </svg>`;
        }

        function svgRelogio() {
            return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"
                         stroke="currentColor" stroke-width="1.3">
                        <circle cx="6.5" cy="6.5" r="5.5"/>
                        <path d="M6.5 3.5v3l2 1.5"/>
                    </svg>`;
        }

        /* ── Classificação ────────────────────────────────────────── */
        function resolver(valor) {
            if (valor > 90) return { classe: "critico", badge: "CRÍTICO", bc: "badge-critico" };
            if (valor > 70) return { classe: "aviso",   badge: "ATENÇÃO", bc: "badge-aviso"   };
            return               { classe: "info",    badge: "INFO",    bc: "badge-info"    };
        }

        /* ── Timestamp legível ────────────────────────────────────── */
        function tempo(ts) {
            if (!ts) return "—";
            try {
                var diff = Math.floor((Date.now() - new Date(ts)) / 60000);
                if (diff < 1)  return "Agora";
                if (diff < 60) return "Há " + diff + " min";
                return "Há " + Math.floor(diff / 60) + "h";
            } catch (e) { return ts; }
        }

        /* ── Título a partir do tipo de métrica ───────────────────── */
        function titulo(alert) {
            var t   = (alert.tipo || "").toUpperCase();
            var val = typeof alert.valor === "number" ? alert.valor : 0;
            var mapa = {
                CPU:   val > 90 ? "CPU acima de 90%"           : "Uso de CPU elevado",
                RAM:   val > 90 ? "Capacidade de RAM crítica"   : "Uso de RAM elevado",
                DISCO: val > 85 ? "Disco próximo do limite"     : "Disco com uso elevado"
            };
            return mapa[t] || (alert.tipo + " — " + val.toFixed(1) + "%");
        }

        function maquina(alert) {
            return alert.maquina || alert.machine || alert.machineId || "—";
        }

        /* ── Monta card ───────────────────────────────────────────── */
        function criarCard(alert) {
            var r   = resolver(alert.valor || 0);
            var div = document.createElement("div");
            div.className = "alert-card " + r.classe;
            div.innerHTML =
                '<div class="alert-icon">' + iconeTipo(r.classe) + '</div>' +
                '<div class="alert-body">' +
                    '<div class="alert-title">' + titulo(alert) + '</div>' +
                    '<div class="alert-desc">' + (alert.mensagem || "") + '</div>' +
                    '<div class="alert-meta">' +
                        '<span class="meta-item">' + svgServer() + ' ' + maquina(alert) + '</span>' +
                        '<span class="meta-item">' + svgRelogio() + ' ' + tempo(alert.timestamp) + '</span>' +
                        '<span class="badge ' + r.bc + '">' + r.badge + '</span>' +
                    '</div>' +
                '</div>';
            return div;
        }

        /* ── Fetch ────────────────────────────────────────────────── */
        async function carregarAlertas() {
            try {
                var response = await fetch("http://localhost:8080/alerts");
                var data = await response.json();

                // ordena: críticos primeiro
                data.sort(function(a, b) { return b.valor - a.valor; });

                var lista = document.getElementById("alerts-list");
                lista.innerHTML = "";

                var criticos = 0, avisos = 0;
                data.forEach(function(alert) {
                    lista.appendChild(criarCard(alert));
                    if (alert.valor > 90)      criticos++;
                    else if (alert.valor > 70) avisos++;
                });

                document.getElementById("count-total").textContent = data.length;
                document.getElementById("count-crit").textContent  = criticos;
                document.getElementById("count-warn").textContent  = avisos;

            } catch (e) {
                console.error("Erro ao carregar alertas:", e);
            }
        }

        carregarAlertas();
        setInterval(carregarAlertas, 3000);
    </script>
</body>
</html>
