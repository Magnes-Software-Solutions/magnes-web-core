<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página inicial</title>
    <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.css" />
    <style>
        .card-kpi {
            background-color: #F4EEFB;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 2px 3px 10px rgba(0, 0, 0, 0.3);
        }

        .card-maquina {
            background-color: #F4EEFB;
            border-radius: 12px;
        }
    </style>
</head>

<body style="background-color: #CED8E4;">
    <div class="container-fluid">
        <header class="row" style="color: #FFF;">
            <nav class="col-md-6 pt-3 pb-1" style="background-color: #000238;">
                <div class="row justify-content-between">
                    <div class="col-3">Magnes</div>
                    <div class="col-9 text-center fw-medium display-6">Bem vindo, <span id="spanNome"></span></div>
                </div>
            </nav>
        </header>
        <div class="row">
            <div style="background-color: #161c47; height: 100vh;" class="col-md-2 col-3">
                <div class="row justify-content-center">
                    <div class="col-12 text-center mt-5" style="color: #FFF;">Home</div>
                    <div class="col-12 text-center mt-4" style="color: #FFF;">Máquinas</div>
                </div>
            </div>
            <div class="col-md-10 col-9">
                <div class="row justify-content-around mt-4">
                    <div class="col-md-3 col-sm-3 col-7 card-kpi p-3 mt-4">
                        <p class="text-center">Máquinas em alerta</p>
                        <span class="display-5 fw-semibold">5</span>
                    </div>
                    <div class="col-md-3 col-sm-3 col-7 card-kpi p-3 mt-4">
                        <p class="text-center">Total de máquinas</p>
                        <span class="display-5 fw-semibold">12</span>
                    </div>
                    <div class="col-md-3 col-sm-3 col-7 card-kpi p-3 mt-4">
                        <p class="text-center">Máquinas em crítico</p>
                        <span class="display-5 fw-semibold">3</span>
                    </div>
                </div>
                <div class="row gy-4 justify-content-around mt-5">
                    <div class="col-md-3 card-maquina" style="border: 2px solid blue;">card 1</div>
                    <div class="col-md-3 card-maquina" style="border: 2px solid blue;">card 2</div>
                    <div class="col-md-3 card-maquina" style="border: 2px solid blue;">card 3</div>
                </div>
                <div class="row justify-content-center mt-5">
                    <button type="button" data-bs-toggle="modal" data-bs-target="#addMachineForm" style="width: 200px;">Adicionar máquina</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addMachineForm" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">New message</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Recipient:</label>
                            <input type="text" class="form-control" id="recipient-name">
                        </div>
                        <div class="mb-3">
                            <label for="message-text" class="col-form-label">Message:</label>
                            <textarea class="form-control" id="message-text"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Send message</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
<script src="../bootstrap-5.3.8-dist/js/bootstrap.js"></script>
<script>
    var nomeUsuario = sessionStorage.NOME_USUARIO
    spanNome.innerHTML = nomeUsuario

</script>
