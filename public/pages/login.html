<script>
  function obterDestinoLogin(email, usuario) {
    var emailNormalizado = "";

    if (email) {
      emailNormalizado = String(email).trim().toLowerCase();
    }

    if (emailNormalizado == "cleber@email.com") {
      return "dashGSS.html";
    }

    if (emailNormalizado == "cibele@gmail.com") {
      return "dashOperacional.html";
    }

    if (emailNormalizado == "jonasrodrigues@gmail.com") {
      return "dashboardGRC.html";
    }

    if (usuario.fkSupervisor == null) {
      return "dashGestor.html";
    }

    return "dashAnalista.html";
  }

  function entrar() {
    var senhaVar = inputPassword.value;
    var emailVar = inputEmail.value;

    if (senhaVar == "" || emailVar == "") {
      modal.style.display = "flex"
      conteiner_msg.innerHTML = `Verifique se não há algum campo em branco!`
      loadingModal()
      return false;
    }

    console.log("FORM LOGIN: ", emailVar);
    console.log("FORM SENHA: ", senhaVar);

    fetch("/user/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar
      })
    }).then(function (resposta) {
      console.log("ESTOU NO THEN DO entrar()! Teste")

      if (resposta.ok) {
        console.log(resposta);

        resposta.json().then(json => {
          console.log("Jason aqui: " + json);
          console.log(JSON.stringify(json));

          sessionStorage.ID_USUARIO = json.idUsuario;
          sessionStorage.NOME_USUARIO = json.nome;
          sessionStorage.EMAIL_USUARIO = json.email;
          sessionStorage.FK_SUPERVISOR = json.fkSupervisor;
          sessionStorage.FK_REDE_HOSPITAL = json.fkRedeHospital;

          var destino = obterDestinoLogin(emailVar, json);
          setTimeout(function () {
            window.location = destino;
          }, 200);

        });

      } else {
        alert("Houve um erro ao tentar realizar o login!");
        console.log("Houve um erro ao tentar realizar o login!");

        resposta.text().then(texto => {
          console.error(texto);

        });
      }

    }).catch(function (erro) {
      console.log(erro);
    })

    return false;
  }
</script>
