        <div class="card">

                <input type="password" id="inputPassword">

                <label>Confirmar sua senha:</label>

<script src="../bootstrap-5.3.8-dist/js/bootstrap.js"></script>
<script src="../services/api.js"></script>
<script src="../services/userService.js"></script>
<script src="../js/sessao.js"></script>
<script>
    async function cadastrarFuncionario() {
        let nomeVar = inputNome.value;
        let emailVar = inputEmail.value;
        let cpfVar = inputCPF.value;
        let telefoneVar = inputTelefone.value;
        let senhaVar = inputPassword.value;
        let confirmacaoSenhaVar = inputPasswordConfirm.value;

        if (nomeVar.trim() == "") {
            alert("È necessario um nome para cadastrar!.");
            console.log("Nome vazio");
            return false;
        }
        else if (emailVar.trim() == "") {
            alert("È necessario um email para poder se cadastrar!.");
            console.log("Email vazio");
            return false;
        }
        else if (cpfVar.trim() == "" || cpfVar.length < 11) {
            alert("CPF invalido, precisa ter 11 caracteres.");
            console.log("CPF vazio ou menor que 11 caracteres");
            return false;
        }
        else if (telefoneVar.trim() == "" || telefoneVar.length > 20) {
            alert("Telefone invalido, precisa ter no maximo 20 caracteres.");
            console.log("Telefone vazio ou maior que 20 caracteres");
            return false;
        }
        else if (senhaVar.trim() == "") {
            alert("È necessario informar uma senha para continuar!.");
            console.log("Senha vazio");
            return false;
        }
        else if (nomeVar.length <= 2) {
            alert("Nome invalido, precisa ser maior que duas letra.");
            console.log("Nome menor que 2 caracteres");
            return false;
        }
        else if ((emailVar.includes("@") && emailVar.includes(".com")) == false) {
            alert("Email precisa ter '@' e '.com'.");
            console.log("Email invalido");
            return false;
        }
        else if (senhaVar.length < 2) {
            alert("A senha precisa ser maior que dois digitos.");
            console.log("Senha menor que 2 caracteres");
            return false;
        }
        else if (senhaVar != confirmacaoSenhaVar) {
            alert("As senhas não coincidem!");
            console.log("Senhas não coincidem");
            return false;
        }
        else {

            const resposta = cadastrarFuncionarioService(nomeVar, emailVar, cpfVar, telefoneVar, senhaVar, sessionStorage.FK_REDE_HOSPITAL, sessionStorage.ID_USUARIO);
            console.log("resposta: ", resposta);

           

            if (!resposta.ok) {
                alert("Cadastro de Funcionário concluído com sucesso!");

            }
            else {
                alert("Houve um erro ao tentar realizar o cadastro do funcionário!");
                return false;
            }
        }

    }
    function pegarDashboard() {
        var idUsuario = sessionStorage.ID_USUARIO;
        fetch(`/dash/PegarDashboard/${idUsuario}`)
            .then(response => response.json())
            .then(data => {
                console.log(data)
                spanNome.innerHTML = data[0].nome;
                const fkSupervisor = data[0].fkSupervisor;
                console.log(fkSupervisor)
                if (fkSupervisor === null) {
                    cargo = "Gerente Tecnico";
                } else {
                    cargo = "Analista de Sistemas";
                }
                nomeCargoNav.innerHTML = cargo;
            })
            .catch(error => {
                console.error("Erro ao pegar dashboard:", error);
            });
    }
    window.onload = pegarDashboard;

</script>
