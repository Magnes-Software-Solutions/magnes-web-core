<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnes | Cadastro</title>
    <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.css" />
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <nav id="navBarTimida" class="navbar navbar-expand-lg fixed-top border-bottom border-body">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img class="" src="https://res.cloudinary.com/dmwq36uby/image/upload/v1771518341/Logo_hlyucq.png"
                    alt="" />
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse align-items-center" id="navbarText">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="../index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Funcionalidades</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Quem Somos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Contato</a>
                    </li>
                </ul>

                <div class="d-grid gap-5 d-md-flex justify-content-center align-items-center">
                    <div class="line"></div>
                    <a style="color: #7a32cc;" class="text-decoration-none" href="./cadastro.html">Cadastrar</a>
                    <a style="background-color: #7A32CC; border: none;"
                        class="btn btn-primary text-white text-decoration-none" href="./login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid right-container" style="height: 100%;">
        <div class="row" style="height: 100%;">
            <div class="col-md-6 banner-cadastro">
            </div>
            <div class="col-md-6 container-form" style="background-color: #E8E8FC;">
                <div class="div-titulo">
                    <img src="../assets/imgs/retorno.svg" id="retorno" onclick="voltar()" style="display: none;">
                    <h1 id="titulo" class="titulo-cadastro">CADASTRO</h1>
                </div>

                <div id="cards_cadastro" class="cards-cadastro">
                    <div class="card-fabricante col-12 col-xxl-6" onclick="escolher('fabricante')">
                        <div class="container-fabricante">
                            <div class="text-title">
                                <h2>Fabricante</h2>
                            </div>
                            <div class="text">
                                <p>Cadastre sua empresa e gere o <br>token de acesso para a sua equipe</p>
                            </div>
                        </div>
                        <div class="img-fabricante">
                            <img src="../assets/imgs/img-fabricante.svg" class="img-fluid" alt="">
                        </div>
                    </div>
                    <div class="card-funcionário col-12 col-xxl-6" onclick="escolher('funcionario')">
                        <div class="container-funcionario">
                            <div class="text-title">
                                <h2>Funcionário</h2>
                            </div>
                            <div class="text">
                                <p>Utilize o token da sua empresa<br>para criar seu perfil de acesso</p>
                            </div>
                        </div>
                        <div class="img-fabricante">
                            <img src="../assets/imgs/img-funcionario.svg" class="img-fluid" alt="">
                        </div>
                    </div>
                </div>

                <form id="form_fabricante">
                    <div class="div-inputs-cadastro">
                        <div class="form-fabricante-col-1">
                            <span>
                                <label for="inputNomeEmpresa" class="form-label">Nome Completo:</label>
                                <input type="text" id="inputNomeEmpresa" class="form-control">
                            </span>
                            <span>
                                <label for="inputEmailEmpresa" class="form-label">Email:</label>
                                <input type="email" id="inputEmailEmpresa" class="form-control">
                            </span>
                            <span>
                                <label for="inputCNPJ" class="form-label">CNPJ:</label>
                                <input type="text" id="inputCNPJ" class="form-control">
                            </span>
                            <span>
                                <label for="inputTelefoneCorporativo" class="form-label">Telefone Corporativo:</label>
                                <input type="tel" id="inputTelefoneCorporativo" class="form-control"
                                    aria-describedby="passwordHelpBlock">
                            </span>
                        </div>
                        <br>
                    </div>
                    <button type="button" onclick="cadastrarEmpresa()">CADASTRAR</button>
                </form>



                <form id="form_funcionario" style="display: none;">
                    <span>
                        <label for="inputNome" class="form-label">Nome Completo:</label>
                        <input type="text" id="inputNome" class="form-control">
                    </span>
                    <span>
                        <label for="inputToken" class="form-label">Token:</label>
                        <input type="text" id="inputToken" class="form-control">
                    </span>
                    <span>
                        <label for="inputCargo" class="form-label">Cargo:</label>
                        <input type="text" id="inputCargo" class="form-control">
                    </span>
                    <span>
                        <label for="inputEmail" class="form-label">Email:</label>
                        <input type="email" id="inputEmail" class="form-control">
                    </span>
                    <span>
                        <label for="inputPassword" class="form-label">Senha:</label>
                        <input type="password" id="inputPassword" class="form-control">
                    </span>
                    <span>
                        <label for="inputPasswordConfirm" class="form-label">Confirme sua senha:</label>
                        <input type="password" id="inputPasswordConfirm" class="form-control"
                            aria-describedby="passwordHelpBlock">
                    </span>
                    <br>
                    <button type="button" onclick="cadastrarFuncionario()">CADASTRAR</button>
                </form>

            </div>
        </div>
    </div>

</body>

</html>
<script src="../bootstrap-5.3.8-dist/js/bootstrap.js"></script>
<script src="../services/api.js"></script>
<script src="../services/userService.js"></script>
<script>

    const banner = document.querySelector('.banner-cadastro');
    const cards_cadastro = document.getElementById('cards_cadastro');
    const form_funcionario = document.getElementById('form_funcionario');
    const form_fabricante = document.getElementById('form_fabricante');
    const retorno = document.getElementById('retorno');
    const titulo = document.getElementById('titulo');

    function escolher(metodo) {
        cards_cadastro.style.display = "none";
        retorno.style.display = "flex";

        if (metodo == 'funcionario') {
            form_funcionario.style.display = "flex";
            titulo.innerText = "CADASTRO - FUNCIONÁRIO";
            banner.style.backgroundImage = "linear-gradient(rgba(4,9,30,0.3),rgba(4,9,30,0.3)),url(../assets/imgs/banner-cadastro-funcionario.png)";
        } else {
            form_fabricante.style.display = "flex";
            titulo.innerText = "CADASTRO - FABRICANTE";
            banner.style.backgroundImage = "linear-gradient(rgba(4,9,30,0.3),rgba(4,9,30,0.3)),url(../assets/imgs/banner-cadastro-fabricante.png)";
        }
    }

    function voltar() {
        cards_cadastro.style.display = "flex";
        form_funcionario.style.display = "none";
        form_fabricante.style.display = "none";
        retorno.style.display = "none";
        titulo.innerText = "CADASTRO";
        banner.style.backgroundImage = "linear-gradient(rgba(4,9,30,0.3),rgba(4,9,30,0.3)),url(../assets/imgs/banner-cadastro.png)";
    }

    let listarEmpresasCadastradas = [];

    async function cadastrarEmpresa() {


        nomeFabricanteVar = inputNomeEmpresa.value;
        console.log("NOME: ", nomeFabricanteVar, inputNomeEmpresa.value)
        cnpjVar = inputCNPJ.value;
        emailEmpresaVar = inputEmailEmpresa.value;
        tel_corporativoVar = inputTelefoneCorporativo.value;

        const resposta = await cadastrarEmpresaService(nomeFabricanteVar, cnpjVar, emailEmpresaVar, tel_corporativoVar)
        console.log("resposta: ", resposta);

        if (resposta.ok) {
            const token = await resposta.json()
            alert(`Cadastro de Empresa concluído com sucesso! \n\nSeu token: ${token}`);

            setTimeout(() => {
                // window.location = "login.html";
            }, 100);
        } else {
            alert("Houve um erro ao tentar realizar o cadastro!");
        }


        console.log("FUNÇÃO CHAMOU")
        return false;
    }

    async function cadastrarFuncionario() {
        let nomeVar = inputNome.value;
        let emailVar = inputEmail.value;
        let cargoVar = inputCargo.value;
        let tokenVar = inputToken.value
        let senhaVar = inputPassword.value;
        let confirmacaoSenhaVar = inputPasswordConfirm.value;

        if (senhaVar !== confirmacaoSenhaVar) {
            alert("As senhas não coincidem!");
            return false;
        }

        const resposta = await cadastrarFuncionarioService(nomeVar, emailVar, senhaVar, tokenVar, cargoVar)
        console.log("resposta: ", resposta);

        if (resposta.ok) {
            alert("Cadastro de Funcionário concluído com sucesso!");

            setTimeout(() => {
                window.location = "login.html";
            }, 100);
        } else {
            alert("Houve um erro ao tentar realizar o cadastro do funcionário!");
        }


        return false;
    }

</script>
