<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAGNES — MRI Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0d1321;
            --sidebar:    #111927;
            --card:       #1a2638;
            --card-hover: #1e2d42;
            --border:     rgba(255,255,255,0.07);
            --text:       #e2e8f0;
            --muted:      #7a8fa6;
            --blue:       #38bdf8;
            --blue-dim:   rgba(56,189,248,0.15);
            --red:        #f43f5e;
            --red-dim:    rgba(244,63,94,0.18);
            --yellow:     #f59e0b;
            --yellow-dim: rgba(245,158,11,0.18);
            --sidebar-w:  200px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            font-size: 14px;
        }

        aside {
            width: var(--sidebar-w);
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 20px 16px 22px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
            background: linear-gradient(135deg,#0ea5e9,#06b6d4);
            display: flex; align-items: center; justify-content: center;
        }

        .logo-text strong {
            font-size: 14px; font-weight: 700;
            letter-spacing: 1.5px; color: #fff; display: block;
        }
        .logo-text span {
            font-size: 9px; color: var(--muted); letter-spacing: 2px;
        }

        nav {
            flex: 1;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px;
            border-radius: 9px;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
            font-size: 13px; font-weight: 500;
            border: 1px solid transparent;
            user-select: none;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active {
            background: rgba(56,189,248,0.1);
            border-color: rgba(56,189,248,0.25);
            color: var(--blue);
        }
        .nav-icon {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .user-area {
            padding: 14px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg,#7c3aed,#4f46e5);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0;
        }
        .user-name  { font-size: 12px; font-weight: 500; color: var(--text); }
        .gear-btn {
            width: 28px; height: 28px; border-radius: 7px;
            background: transparent; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--muted); transition: all .2s;
        }
        .gear-btn:hover { background: var(--card); color: var(--text); }

        main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 32px 36px;
            min-height: 100vh;
        }

        h1 {
            font-size: 22px; font-weight: 700;
            margin-bottom: 24px; color: #fff;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 32px;
        }

        .s-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .s-label {
            font-size: 10px; letter-spacing: 1px;
            font-weight: 600; color: var(--muted); margin-bottom: 6px;
        }
        .s-num { font-size: 28px; font-weight: 700; line-height: 1; }
        .s-total .s-num { color: var(--blue); }
        .s-crit  .s-num { color: var(--red); }
        .s-warn  .s-num { color: var(--yellow); }

        .s-icon-wrap {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .s-total .s-icon-wrap { background: var(--blue-dim); }
        .s-crit  .s-icon-wrap { background: var(--red-dim); }
        .s-warn  .s-icon-wrap { background: var(--yellow-dim); }

        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .alert-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
            display: flex;
            align-items: flex-start;
            gap: 18px;
            border-left: 4px solid transparent;
            cursor: default;
            transition: background .2s, transform .15s;
            animation: fadeUp .35s ease both;
        }
        .alert-card:hover {
            background: var(--card-hover);
            transform: translateX(2px);
        }

        /* borda lateral */
        .alert-card.critico { border-left-color: var(--red); }
        .alert-card.aviso   { border-left-color: var(--yellow); }
        .alert-card.info    { border-left-color: var(--blue); }

        /* ícone */
        .alert-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .alert-card.critico .alert-icon { background: var(--red-dim); }
        .alert-card.aviso   .alert-icon { background: var(--yellow-dim); }
        .alert-card.info    .alert-icon { background: var(--blue-dim); }

        /* conteúdo */
        .alert-body { flex: 1; }

        .alert-title {
            font-size: 16px; font-weight: 700;
            color: #fff; margin-bottom: 5px; line-height: 1.3;
        }

        .alert-desc {
            font-size: 13px; color: var(--muted);
            line-height: 1.6; margin-bottom: 14px;
        }

        .alert-meta {
            display: flex; align-items: center; gap: 18px;
            font-size: 12px; color: var(--muted);
        }
        .meta-item { display: flex; align-items: center; gap: 5px; }

        .badge {
            font-size: 10px; font-weight: 700;
            letter-spacing: .8px;
            padding: 3px 12px; border-radius: 999px;
        }
        .badge-critico {
            background: rgba(244,63,94,.12); color: #f87196;
            border: 1px solid rgba(244,63,94,.45);
        }
        .badge-aviso {
            background: rgba(245,158,11,.12); color: #fbbf24;
            border: 1px solid rgba(245,158,11,.45);
        }
        .badge-info {
            background: rgba(56,189,248,.12); color: #7dd3fc;
            border: 1px solid rgba(56,189,248,.45);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .alert-card:nth-child(1) { animation-delay: .04s; }
        .alert-card:nth-child(2) { animation-delay: .08s; }
        .alert-card:nth-child(3) { animation-delay: .12s; }
        .alert-card:nth-child(4) { animation-delay: .16s; }
        .alert-card:nth-child(5) { animation-delay: .20s; }
    </style>
</head>
<body>

<aside>
    <div class="logo-area">
        <div class="logo-icon" onclick="window.location.href='dashAnalista.html'">
            <img style="width:100%;height:100%;object-fit:cover;" src="../assets/imgs/Logo.png"
                 onerror="this.style.display='none'"
                 alt="Logo" />
        </div>
        <div class="logo-text">
            <strong>MAGNES</strong>
            <span>MRI MONITOR</span>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="dashboardVoltar()">
            <div class="nav-icon">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <rect x="1" y="1" width="6" height="6" rx="1.5"/>
                    <rect x="9" y="1" width="6" height="6" rx="1.5"/>
                    <rect x="1" y="9" width="6" height="6" rx="1.5"/>
                    <rect x="9" y="9" width="6" height="6" rx="1.5"/>
                </svg>
            </div>
            Dashboard
        </div>

        <div class="nav-item active">
            <div class="nav-icon">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="8" cy="8" r="6.5"/>
                    <line x1="8" y1="5" x2="8" y2="8.5"/>
                    <circle cx="8" cy="11" r=".75" fill="currentColor" stroke="none"/>
                </svg>
            </div>
            Alertas
        </div>
    </nav>

    <div class="user-area">
        <div class="user-info">
            <div class="avatar">BR</div>
            <div class="user-name" id="user-name-display"></div>
        </div>
        <div class="gear-btn">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
                <circle cx="7" cy="7" r="2"/>
                <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06"/>
            </svg>
        </div>
    </div>
</aside>

<main>
    <h1>Central de Alertas</h1>

    <div class="summary">
        <div class="s-card s-total">
            <div>
                <div class="s-label">TOTAL</div>
                <div class="s-num" id="count-total">—</div>
            </div>
            <div class="s-icon-wrap">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#38bdf8" stroke-width="1.8">
                    <circle cx="11" cy="11" r="9"/>
                    <line x1="11" y1="7" x2="11" y2="11.5"/>
                    <circle cx="11" cy="14.5" r="1" fill="#38bdf8" stroke="none"/>
                </svg>
            </div>
        </div>
        <div class="s-card s-crit">
            <div>
                <div class="s-label">CRÍTICOS</div>
                <div class="s-num" id="count-crit">—</div>
            </div>
            <div class="s-icon-wrap">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f43f5e" stroke-width="1.8">
                    <circle cx="11" cy="11" r="9"/>
                    <line x1="11" y1="7" x2="11" y2="11.5"/>
                    <circle cx="11" cy="14.5" r="1" fill="#f43f5e" stroke="none"/>
                </svg>
            </div>
        </div>
        <div class="s-card s-warn">
            <div>
                <div class="s-label">AVISOS</div>
                <div class="s-num" id="count-warn">—</div>
            </div>
            <div class="s-icon-wrap">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f59e0b" stroke-width="1.8">
                    <path d="M11 3L20 19H2L11 3z"/>
                    <line x1="11" y1="10" x2="11" y2="14"/>
                    <circle cx="11" cy="16.5" r="1" fill="#f59e0b" stroke="none"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="alerts-list" id="alerts-list">
        <div style="color:var(--muted);font-size:13px;padding:20px 0;">Carregando alertas...</div>
    </div>
</main>

<script>
    // Nome do usuário
    const nome = sessionStorage.getItem("NOME_USUARIO");

    if (nome) {
        document.getElementById("user-name-display").textContent = "Olá, " + nome + "!";
    } else {
        window.location = "../login.html";
    }

    function definirClasse(valor) {
        if (valor > 90) return "critico";
        if (valor > 70) return "aviso";
        return "info";
    }

    function definirBadge(valor) {
        if (valor > 90) return { texto: "CRÍTICO", classe: "badge-critico" };
        if (valor > 70) return { texto: "ATENÇÃO", classe: "badge-aviso" };
        return { texto: "INFO", classe: "badge-info" };
    }

    async function carregarAlertas() {
    try {
        const response = await fetch("http://localhost:8080/alerts");
        const data = await response.json();

        const lista = document.getElementById("alerts-list");

        data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        let criticos = 0;
        let avisos = 0;

        data.forEach(alert => {
            const id = alert.timestamp + alert.tipo; 

            if (document.getElementById(id)) return;

            const classe =
                alert.valor > 90 ? "critico" :
                alert.valor > 70 ? "aviso" : "info";

            const badge =
                alert.valor > 90 ? { texto: "CRÍTICO", classe: "badge-critico" } :
                alert.valor > 70 ? { texto: "ATENÇÃO", classe: "badge-aviso" } :
                { texto: "INFO", classe: "badge-info" };

            if (alert.valor > 90) criticos++;
            else if (alert.valor > 70) avisos++;

            const div = document.createElement("div");
            div.className = "alert-card " + classe;
            div.id = id;

            div.innerHTML = `
                <div class="alert-body">
                    <div class="alert-title">
                        ${alert.tipo} - ${alert.valor.toFixed(1)}%
                    </div>

                    <div class="alert-desc">
                        ${alert.mensagem}
                    </div>

                    <div class="alert-meta">
                        <span>${alert.maquina || "Máquina"}</span>
                        <span>${alert.timestamp}</span>
                        <span class="badge ${badge.classe}">
                            ${badge.texto}
                        </span>
                    </div>
                </div>
            `;

    
            lista.prepend(div);
        });

        document.getElementById("count-total").textContent = data.length;
        document.getElementById("count-crit").textContent = criticos;
        document.getElementById("count-warn").textContent = avisos;

    } catch (erro) {
        console.error("Erro:", erro);
    }
}

    carregarAlertas();
    setInterval(carregarAlertas, 3000);

    function dashboardVoltar() {
        window.location.href = "dashAnalista.html";
    }
</script>
</body>
</html>
