<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAGNES — MRI Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/telaAlerta.css" />

</head>

<body>


    <aside>
        <div class="logo-area">
            <div class="logo-icon" onclick="window.location.href='dashAnalista.html'">
                <img style="width: 100%; height: 100%;" src="../assets/imgs/Logo.png" alt="Logo do Magnes" />
                   
            </div>
            <div class="logo-text">
                <strong>MAGNES</strong><br />
                <span>MRI MONITOR</span>
            </div>
        </div>

        <nav>
            <div class="nav-item" onclick=dashboardVoltar()>
                <div class="nav-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <rect x="1" y="1" width="6" height="6" rx="1.5" />
                        <rect x="9" y="1" width="6" height="6" rx="1.5" />
                        <rect x="1" y="9" width="6" height="6" rx="1.5" />
                        <rect x="9" y="9" width="6" height="6" rx="1.5" />
                    </svg>
                </div>

                Dashboard


            </div>

            <div class="nav-item active" onclick="setNav(this)">
                <div class="nav-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="8" cy="8" r="6.5" />
                        <line x1="8" y1="5" x2="8" y2="8.5" />
                        <circle cx="8" cy="11" r=".75" fill="currentColor" stroke="none" />
                    </svg>
                </div>

                Alertas

            </div>
        </nav>

        <div class="user-area">
            <div class="user-info">
                <div class="avatar">BR</div>
                <div>
                    <div class="user-name"></div>
                
                </div>
            </div>
            <div class="gear-btn">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
                    <circle cx="7" cy="7" r="2" />
                    <path
                        d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06" />
                </svg>
            </div>
        </div>
    </aside>

   
    <main>
        <h1>Central de Alertas</h1>

     
        <div class="summary">
            <div class="s-card s-total">
                <div>
                    <div class="s-label">TOTAL</div>
                    <div class="s-num" id="count-total">5</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#38bdf8" stroke-width="1.8">
                        <circle cx="11" cy="11" r="9" />
                        <line x1="11" y1="7" x2="11" y2="11.5" />
                        <circle cx="11" cy="14.5" r="1" fill="#38bdf8" stroke="none" />
                    </svg>
                </div>
            </div>

            <div class="s-card s-crit">
                <div>
                    <div class="s-label">CRÍTICOS</div>
                    <div class="s-num" id="count-crit">2</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f43f5e" stroke-width="1.8">
                        <circle cx="11" cy="11" r="9" />
                        <line x1="11" y1="7" x2="11" y2="11.5" />
                        <circle cx="11" cy="14.5" r="1" fill="#f43f5e" stroke="none" />
                    </svg>
                </div>
            </div>

            <div class="s-card s-warn">
                <div>
                    <div class="s-label">AVISOS</div>
                    <div class="s-num" id="count-warn">2</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f59e0b" stroke-width="1.8">
                        <path d="M11 3L20 19H2L11 3z" />
                        <line x1="11" y1="10" x2="11" y2="14" />
                        <circle cx="11" cy="16.5" r="1" fill="#f59e0b" stroke="none" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Alerts -->
        <div class="alerts-list" id="alerts-list"></div>
    </main>

    <script>
       function pegarNomeUsuario() {
    var nome = sessionStorage.getItem("NOME_USUARIO");

    if (nome) {
        document.querySelector(".user-name").innerHTML = `Olá, ${nome}!`;
    } else {
        window.location = "../login.html";
    }
}
pegarNomeUsuario();
        function dashboardVoltar() {
            window.location.href = "dashAnalista.html";
        }
        const ALERTS = [
            {
                type: "critico",
                title: "CPU acima de 90%",
                desc: "MRI-04 está operando com CPU em 92%. Intervenção imediata recomendada.",
                machine: "MRI-04",
                time: "Há 5 minutos",
                badge: "CRÍTICO"
            },
            {
                type: "critico",
                title: "Temperatura crítica detectada",
                desc: "MRI-08 atingiu 68°C. Sistema térmico pode estar comprometido.",
                machine: "MRI-08",
                time: "Há 12 minutos",
                badge: "CRÍTICO"
            },
            {
                type: "atencao",
                title: "Uso de RAM elevado",
                desc: "MRI-03 com 85% de RAM ocupada. Monitoramento contínuo ativado.",
                machine: "MRI-03",
                time: "Há 25 minutos",
                badge: "ATENÇÃO"
            },
            {
                type: "atencao",
                title: "Disco próximo do limite",
                desc: "Partição de imagens (E:) em MRI-06 está 92% ocupada.",
                machine: "MRI-06",
                time: "Há 1 hora",
                badge: "ATENÇÃO"
            },
            {
                type: "info",
                title: "Backup automático concluído",
                desc: "Backup de dados realizado com sucesso em todas as máquinas ativas.",
                machine: "TODAS",
                time: "Há 2 horas",
                badge: "INFO"
            }
        ];

        function iconForType(type) {
            if (type === "critico") return `
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#f43f5e" stroke-width="1.8">
        <circle cx="10" cy="10" r="8"/>
        <line x1="10" y1="6.5" x2="10" y2="10.5"/>
        <circle cx="10" cy="13" r=".9" fill="#f43f5e" stroke="none"/>
      </svg>`;
            if (type === "atencao") return `
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#f59e0b" stroke-width="1.8">
        <path d="M10 2.5L18.5 17H1.5L10 2.5z"/>
        <line x1="10" y1="9" x2="10" y2="12.5"/>
        <circle cx="10" cy="14.5" r=".9" fill="#f59e0b" stroke="none"/>
      </svg>`;
            return `
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#38bdf8" stroke-width="1.8">
        <circle cx="10" cy="10" r="8"/>
        <line x1="10" y1="9" x2="10" y2="14"/>
        <circle cx="10" cy="6.5" r=".9" fill="#38bdf8" stroke="none"/>
      </svg>`;
        }

        function badgeClass(type) {
            if (type === "critico") return "badge-critico";
            if (type === "atencao") return "badge-atencao";
            return "badge-info";
        }

        function serverIcon() {
            return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3">
      <rect x="1" y="1" width="11" height="4" rx="1"/>
      <rect x="1" y="8" width="11" height="4" rx="1"/>
      <circle cx="9.5" cy="3" r=".7" fill="currentColor" stroke="none"/>
      <circle cx="9.5" cy="10" r=".7" fill="currentColor" stroke="none"/>
    </svg>`;
        }

        function clockIcon() {
            return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3">
      <circle cx="6.5" cy="6.5" r="5.5"/>
      <path d="M6.5 3.5v3l2 1.5"/>
    </svg>`;
        }

        const list = document.getElementById("alerts-list");

        ALERTS.forEach(a => {
            const card = document.createElement("div");
            card.className = `alert-card ${a.type}`;
            card.innerHTML = `
      <div class="alert-icon">${iconForType(a.type)}</div>
      <div class="alert-body">
        <div class="alert-title">${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
        <div class="alert-meta">
          <span class="meta-item">${serverIcon()} ${a.machine}</span>
          <span class="meta-item">${clockIcon()} ${a.time}</span>
          <span class="badge ${badgeClass(a.type)}">${a.badge}</span>
        </div>
      </div>`;
            list.appendChild(card);
        });

        // Contadores
        const crits = ALERTS.filter(a => a.type === "critico").length;
        const warns = ALERTS.filter(a => a.type === "atencao").length;
        document.getElementById("count-total").textContent = ALERTS.length;
        document.getElementById("count-crit").textContent = crits;
        document.getElementById("count-warn").textContent = warns;

        function setNav(el) {
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            el.classList.add("active");
        }
    </script>
</body>

</html>
