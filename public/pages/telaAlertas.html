<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alertas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/telaAlerta.css" />
    <link rel="stylesheet" href="../css/headerDash.css">
    <link rel="shortcut icon" href="../assets/imgs/Logo.png" type="image/x-icon" />
</head>

<body>

    <nav class="navbar fixed-top navBarTop">
                <div class="container-fluid">
                    <img src="../assets/imgs/Logo.png" alt="" width="5%" height="85%">
                    <div class="titulo">
                        <p class="tituloLogo">MAGNES</p>
                        <p class="textoLogo">MRI MONITOR</p>
                    </div>
                    <button class="navbar-toggler navBarToggler" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon navBarTogglerIcon"></span>
                    </button>
                    <div class="offcanvas offcanvas-end offCanvas" tabindex="-1" id="offcanvasNavbar"
                        aria-labelledby="offcanvasNavbarLabel">
                        <div class="offcanvas-header">
                            <h5 class="offcanvas-title offCanvasTitle" id="offcanvasNavbarLabel">MAGNES</h5>
                            <button type="button" class="btn-close offCanvasButton" data-bs-dismiss="offcanvas"
                                aria-label="Close"></button>
                        </div>
                        <div class="offcanvas-body offcanvasBody">
                            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3 navBarNav">
                                <li class="nav-item navLi">
                                    <img src="../assets/imgs/dashboard.svg" alt="Simbolo de Dashboard">
                                    <a class="nav-link" href="dashAnalista.html">Dashboard</a>
                                </li>
                                <li onclick="alertas()" class="nav-item navLi navLiActive">
                                    <img src="../assets/imgs/alert.svg" alt="Simbolo de Alerta">
                                    <a class="nav-link" href="#">Alerta</a>
                                </li>
                                <li class="nav-item navLi navLiLogout" onclick="limparSessao()">
                                    <img src="../assets/imgs/box-arrow-left.svg" alt="" class="navItemIcon" />
                                    <a class="nav-link">Logout</a>
                                </li>
                            </ul>
                        </div>
                        <div class="offcanvas-header perfil" onclick="window.location.href='dashUsuario.html'">
                            <img class="perfilImage" src="../assets/imgs/person-circle.svg" alt="Simbolo de perfil">
                            <div class="textosPerfil">
                                <h5 class="offcanvas-title" id="spanNome">(nome do banco)</h5>
                                <p id="cargoUsuarioNav">(cargo do banco)</p>
                            </div>
                            <img class="perfilConfig" src="../assets/imgs/gear.svg" alt="Simbolo de configurações">
                        </div>
                    </div>
                </div>
            </nav>

    <main>
        <h1>Central de Alertas</h1>
        <button class="btn-limpar" onclick="limparAlertas()">
            Limpar Alertas
        </button>
        <div class="summary">
            <div class="s-card s-total">
                <div>
                    <div class="s-label">TOTAL</div>
                    <div class="s-num" id="count-total">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#38bdf8" stroke-width="1.8">
                        <circle cx="11" cy="11" r="9" />
                        <line x1="11" y1="7" x2="11" y2="11.5" />
                        <circle cx="11" cy="14.5" r="1" fill="#38bdf8" stroke="none" />
                    </svg>
                </div>
            </div>

            <div class="s-card s-crit">
                <div>
                    <div class="s-label">CRÍTICOS</div>
                    <div class="s-num" id="count-crit">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f43f5e" stroke-width="1.8">
                        <circle cx="11" cy="11" r="9" />
                        <line x1="11" y1="7" x2="11" y2="11.5" />
                        <circle cx="11" cy="14.5" r="1" fill="#f43f5e" stroke="none" />
                    </svg>
                </div>
            </div>

            <div class="s-card s-warn">
                <div>
                    <div class="s-label">ATENÇÃO</div>
                    <div class="s-num" id="count-warn">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f59e0b" stroke-width="1.8">
                        <path d="M11 3L20 19H2L11 3z" />
                        <line x1="11" y1="10" x2="11" y2="14" />
                        <circle cx="11" cy="16.5" r="1" fill="#f59e0b" stroke="none" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="alerts-list" id="alerts-list">
            <!-- <div class="loading-msg">Carregando alertas...</div> -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const list = document.getElementById("alerts-list");

        function iconForType(type) {
            if (type === "critico") return `
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#f43f5e" stroke-width="1.8">
            <circle cx="10" cy="10" r="8"/>
            <line x1="10" y1="6.5" x2="10" y2="10.5"/>
            <circle cx="10" cy="13" r=".9" fill="#f43f5e"/>
        </svg>`;

            if (type === "atencao") return `
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#f59e0b" stroke-width="1.8">
            <path d="M10 2.5L18.5 17H1.5L10 2.5z"/>
            <line x1="10" y1="9" x2="10" y2="12.5"/>
            <circle cx="10" cy="14.5" r=".9" fill="#f59e0b"/>
        </svg>`;

            return `
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#38bdf8" stroke-width="1.8">
            <circle cx="10" cy="10" r="8"/>
            <line x1="10" y1="9" x2="10" y2="14"/>
            <circle cx="10" cy="6.5" r=".9" fill="#38bdf8"/>
        </svg>`;
        }

        function badgeClass(type) {
            if (type === "critico") return "badge-critico";
            if (type === "atencao") return "badge-atencao";
            return "badge-info";
        }

        function serverIcon() {
            return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor">
        <rect x="1" y="1" width="11" height="4" rx="1"/>
        <rect x="1" y="8" width="11" height="4" rx="1"/>
    </svg>`;
        }

        function clockIcon() {
            return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor">
        <circle cx="6.5" cy="6.5" r="5.5"/>
        <path d="M6.5 3.5v3l2 1.5"/>
    </svg>`;
        }

        function gerarAlertaAleatorio() {
            const tipos = ["critico", "atencao", "info"];

            const tipo = tipos[Math.floor(Math.random() * tipos.length)];

            return {
                type: tipo,
                title: tipo === "critico" ? "CPU acima de 90%" :
                    tipo === "atencao" ? "Uso de RAM elevado" :
                        "Backup concluído",

                desc: "Alerta gerado automaticamente pelo sistema",
                machine: "MRI-" + Math.floor(Math.random() * 10),
                time: "Agora",
                badge: tipo.toUpperCase()
            };
        }

        function adicionarAlerta(a) {
            const card = document.createElement("div");
            card.className = `alert-card ${a.type}`;

            card.innerHTML = `
        <div class="alert-icon">${iconForType(a.type)}</div>
        <div class="alert-body">
            <div class="alert-title">${a.title}</div>
            <div class="alert-desc">${a.desc}</div>
            <div class="alert-meta">
                <span>${serverIcon()} ${a.machine}</span>
                <span>${clockIcon()} ${a.time}</span>
                <span class="badge ${badgeClass(a.type)}">${a.badge}</span>
            </div>
        </div>
    `;

            list.prepend(card);
        }

        function atualizarContadores() {
            const cards = document.querySelectorAll(".alert-card");

            let total = cards.length;
            let crit = 0;
            let warn = 0;

            cards.forEach(card => {
                if (card.classList.contains("critico")) crit++;
                if (card.classList.contains("atencao")) warn++;
            });

            document.getElementById("count-total").textContent = total;
            document.getElementById("count-crit").textContent = crit;
            document.getElementById("count-warn").textContent = warn;
        }

        setInterval(() => {
            const alerta = gerarAlertaAleatorio();
            adicionarAlerta(alerta);
            atualizarContadores();
        }, 4000); // a cada 4s

        function limparAlertas() {
            list.innerHTML = "<div class='loading-msg'>Nenhum alerta no momento</div>";

            document.getElementById("count-total").textContent = 0;
            document.getElementById("count-crit").textContent = 0;
            document.getElementById("count-warn").textContent = 0;
        }

        function dashboardVoltar() {
            window.location.href = "dashAnalista.html";
        }

        function pegarDashboard() {
        var idUsuario = sessionStorage.ID_USUARIO;
        fetch(`/dash/PegarDashboard/${idUsuario}`)
            .then(response => response.json())
            .then(data => {
                console.log(data)
                spanNome.innerHTML = data[0].nome;
                const fkSupervisor = data[0].fkSupervisor;
                console.log(fkSupervisor)
                if (fkSupervisor === null) {
                    cargo = "Gerente Tecnico";
                } else {
                    cargo = "Analista de Sistemas";
                }
                cargoUsuarioNav.innerHTML = cargo;
            })
            .catch(error => {
                console.error("Erro ao pegar dashboard:", error);
            });
    }

    pegarDashboard();
    </script>
</body>

</html>
