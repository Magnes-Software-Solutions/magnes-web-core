<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAGNES — MRI Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/telaAlerta.css" />
</head>

<body>
    <!-- Menu Lateral -->
    <aside>
        <div class="logo-area">
            <div class="logo-icon" onclick="window.location.href='dashAnalista.html'">
                <img style="width:100%;height:100%;object-fit:cover;" src="../assets/imgs/Logo.png" alt="Logo" />
            </div>
            <div class="logo-text">
                <strong>MAGNES</strong>
                <span>MRI MONITOR</span>
            </div>
        </div>

        <nav>
            <!-- SVG icons utiliza bootstrap -->
            <div class="nav-item" onclick="dashboardVoltar()">
                <div class="nav-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <rect x="1" y="1" width="6" height="6" rx="1.5" />
                        <rect x="9" y="1" width="6" height="6" rx="1.5" />
                        <rect x="1" y="9" width="6" height="6" rx="1.5" />
                        <rect x="9" y="9" width="6" height="6" rx="1.5" />
                    </svg>
                </div>
                Dashboard
            </div>

            <div class="nav-item active">
                <div class="nav-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <circle cx="8" cy="8" r="6.5" />
                        <line x1="8" y1="5" x2="8" y2="8.5" />
                        <circle cx="8" cy="11" r=".75" fill="currentColor" stroke="none" />
                    </svg>
                </div>
                Alertas
            </div>
        </nav>

        <div class="user-area">
            <div class="user-info">
                <div class="avatar">BR</div>
                <div class="user-name" id="foto_usuario_div"></div>
            </div>
            <div class="gear-btn">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
                    <circle cx="7" cy="7" r="2" />
                    <path
                        d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.93 2.93l1.06 1.06M10.01 10.01l1.06 1.06M2.93 11.07l1.06-1.06M10.01 3.99l1.06-1.06" />
                </svg>
            </div>
        </div>
    </aside>
    <!-- Tela principal -->
    <main>
        <h1>Central de Alertas</h1>

        <div class="summary">
            <div class="s-card s-total">
                <div>
                    <div class="s-label">TOTAL</div>
                    <div class="s-num" id="count-total">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#38bdf8" stroke-width="1.8">
                        <circle cx="11" cy="11" r="9" />
                        <line x1="11" y1="7" x2="11" y2="11.5" />
                        <circle cx="11" cy="14.5" r="1" fill="#38bdf8" stroke="none" />
                    </svg>
                </div>
            </div>
            <div class="s-card s-crit">
                <div>
                    <div class="s-label">CRÍTICOS</div>
                    <div class="s-num" id="count-crit">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f43f5e" stroke-width="1.8">
                        <circle cx="11" cy="11" r="9" />
                        <line x1="11" y1="7" x2="11" y2="11.5" />
                        <circle cx="11" cy="14.5" r="1" fill="#f43f5e" stroke="none" />
                    </svg>
                </div>
            </div>
            <div class="s-card s-warn">
                <div>
                    <div class="s-label">ATENÇÃO</div>
                    <div class="s-num" id="count-warn">—</div>
                </div>
                <div class="s-icon-wrap">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#f59e0b" stroke-width="1.8">
                        <path d="M11 3L20 19H2L11 3z" />
                        <line x1="11" y1="10" x2="11" y2="14" />
                        <circle cx="11" cy="16.5" r="1" fill="#f59e0b" stroke="none" />
                    </svg>
                </div>
            </div>
        </div>
        <!-- Aqui os alertas são exibidos dinamicamente com JS -->
        <div class="alerts-list" id="alerts-list">
            <div style="color:var(--muted);font-size:13px;padding:20px 0;">Carregando alertas...</div>
        </div>
    </main>

    <script>
        // Nome do usuário
        var nome = sessionStorage.getItem("NOME_USUARIO");

        if (nome) {
            document.getElementById("foto_usuario_div").textContent = "Olá, " + nome + "!";
        } else {
            window.location = "../login.html";
        }

        function definirClasse(valor) {
            if (valor > 90) return "critico";
            if (valor > 70) return "aviso";
            return "info";
        }

        function definirBadge(valor) {
            if (valor > 90) return { texto: "CRÍTICO", classe: "badge-critico" };
            if (valor > 70) return { texto: "ATENÇÃO", classe: "badge-aviso" };
            return { texto: "INFO", classe: "badge-info" };
        }
        var criticos = 0;
        var avisos = 0;
        async function carregarAlertas() {
            try {
                // Busca os alertas da API
                var response = await fetch("http://localhost:8080/alerts");
                var data = await response.json();

                var lista = document.getElementById("alerts-list");

                // Ordena os alertas do mais recente para o mais antigo

                data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));



                data.forEach(alert => {
                    // Cada alerta tem um ID único baseado no timestamp e tipo para evitar duplicados
                    var id = alert.timestamp + alert.tipo;
                    // Evita criar alertas duplicados
                    if (document.getElementById(id)) return;
                    // Define a classe e badge com base no valor do alerta
                    var classe =
                        alert.valor > 90 ? "critico" :
                            alert.valor > 70 ? "aviso" : "info";

                    var badge =
                        alert.valor > 90 ? { texto: "CRÍTICO", classe: "badge-critico" } :
                            alert.valor > 70 ? { texto: "ATENÇÃO", classe: "badge-aviso" } :
                                { texto: "INFO", classe: "badge-info" };

                    // Dependendo do valor, incrementa os contadores de críticos e avisos
                    if (alert.valor > 90) { criticos += 1; }
                    else if (alert.valor > 70) { avisos += 1; }

                    var div = document.createElement("div");
                    div.className = "alert-card " + classe;
                    div.id = id;

                    div.innerHTML = `
                <div class="alert-body">
                    <div class="alert-title">
                        ${alert.tipo} - ${alert.valor.toFixed(1)}%
                    </div>

                    <div class="alert-desc">
                        ${alert.mensagem}
                    </div>

                    <div class="alert-meta">
                        <span>${alert.maquina || "Máquina"}</span>
                        <span>${alert.timestamp}</span>
                        <span class="badge ${badge.classe}">
                            ${badge.texto}
                        </span>
                    </div>
                </div>
            `;

                // Adiciona o novo alerta no topo da lista
                    lista.prepend(div);
                });
                // Atualiza os contadores
                document.getElementById("count-total").textContent = data.length;
                document.getElementById("count-crit").textContent = criticos;
                document.getElementById("count-warn").textContent = avisos;

            } catch (erro) {
                console.error("Erro:", erro);
            }
        }

        carregarAlertas();

        // Atualiza os alertas a cada 3 segundos
        // Ou seja, a cada 3 segundos ele faz uma nova requisição para buscar os alertas mais recentes
        setInterval(carregarAlertas, 3000);

        function dashboardVoltar() {
            window.location.href = "dashAnalista.html";
        }
    </script>
</body>

</html>
